name: Demo Security Validation Pipeline

on:
  push:
    branches: [ main, pipeline ]   # trigger this action on any push to main branch
  workflow_dispatch:     # or we can manually trigger it for test purposes

jobs:
  demo-job:
    name: Automate running an InSpec profile
    runs-on: ubuntu-20.04
    steps:
      - name: Update runner # always good to practice good runner hygeine
        run: sudo apt-get update
      - name: Install InSpec executable # the runner needs the InSpec executable
        run: curl https://omnitruck.chef.io/install.sh | sudo bash -s -- -P inspec
      - name: Check out this repository # and some profile code to run
        uses: actions/checkout@v3
      - name: Run InSpec  # the simple profile in /pipeline will import the Ubuntu STIG baseline profile
        run: |
          sudo inspec exec pipeline/pipeline_profile \
          --chef-license=accept \
          --input_file=pipeline/ubuntu_inputs.yml \
          --reporter cli json:pipeline/results/test_run.json
      - name: Save Test Result JSON  # save our results to the pipeline artifacts
        if: ${{ always() }}  # make sure we always save the result, even if the InSpec run found failing tests
        uses: actions/upload-artifact@v3
        with:
          path: pipeline/results/test_run.json
      - name: Display our results summary  # now we can work with the result file in later steps
        uses: mitre/saf_action@v1
        with:
          command_string: "view summary -i pipeline/results/test_run.json"
      - name: Ensure the scan meets our ${{ matrix.suite }} results threshold
        uses: mitre/saf_action@v1
        with:
          command_string: "validate threshold -i pipeline/results/test_run.json -F threshold.yml"
